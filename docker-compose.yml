version: '3.8'

services:
   # PostgreSQL Database
   postgres:
     image: postgres:15-alpine
     container_name: algo_trading_db
     restart: always
     environment:
      POSTGRES_DB: ${POSTGRES_DB:-algo_trading}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/db-init:/docker-entrypoint-initdb.d
    networks:
      - algo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

   # Redis Cache (Optional)
   redis:
     image: redis:7-alpine
     container_name: algo_trading_redis
     restart: always
     command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - algo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

   # Backend API Server
   backend:
     build:
       context: .
       dockerfile: Dockerfile
     container_name: algo_trading_backend
     restart: always
     env_file:
       - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-securepassword123}@postgres:5432/${POSTGRES_DB:-algo_trading}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

   # Frontend Web Server
   frontend:
     build:
       context: ./frontend
       dockerfile: Dockerfile
     container_name: algo_trading_frontend
     restart: always
     ports:
       - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - algo_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

   # Daily Strategy Runner (Scheduled Jobs)
   daily_runner:
     build:
       context: .
       dockerfile: Dockerfile
     container_name: algo_trading_daily_runner
     restart: always
     env_file:
       - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-securepassword123}@postgres:5432/${POSTGRES_DB:-algo_trading}
    volumes:
      - ./logs:/app/logs
      - ./scripts:/app/scripts
    depends_on:
      - postgres
      - backend
    networks:
      - algo_network
    command: >
      python -c "
      import time;
      while True:
        time.sleep(300)
      "

networks:
  algo_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
